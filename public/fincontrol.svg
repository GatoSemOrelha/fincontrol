<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Bank Icon -->
  <g transform="translate(50, 40) scale(1.2)">
    <!-- Roof -->
    <path d="M4 30 L40 10 L76 30 Z" fill="none" stroke="#3498db" stroke-width="6" stroke-linejoin="round"/>
    <!-- Base line under roof -->
    <line x1="4" y1="34" x2="76" y2="34" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Pillars -->
    <line x1="16" y1="40" x2="16" y2="70" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="30" y2="70" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    <line x1="44" y1="40" x2="44" y2="70" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    <line x1="58" y1="40" x2="58" y2="70" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Chart Bars (Inside Bank) -->
    <rect x="25" y="55" width="4" height="15" fill="#e74c3c" rx="1"/>
    <rect x="35" y="45" width="4" height="25" fill="#2ecc71" rx="1"/>
    <rect x="45" y="35" width="4" height="35" fill="#f1c40f" rx="1"/>
    
    <!-- Floor -->
    <line x1="4" y1="76" x2="76" y2="76" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
    <line x1="2" y1="84" x2="78" y2="84" stroke="#3498db" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="100" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="currentColor" text-anchor="middle" letter-spacing="1">FinControl</text>
</svg>
